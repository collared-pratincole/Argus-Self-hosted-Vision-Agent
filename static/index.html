<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>识图智能体</title>
<style>
  :root {
    --bg: #0e1117; --surface: #161b22; --border: #30363d;
    --text: #e6edf3; --text2: #8b949e; --accent: #58a6ff;
    --green: #3fb950; --red: #f85149; --radius: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); min-height:100vh; }

  .container { max-width: 860px; margin: 0 auto; padding: 32px 20px; }
  h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: var(--text2); font-size: .85rem; margin-bottom: 28px; }

  /* ── 配置栏 ─────────────────────────────── */
  .config-bar { display:flex; gap:10px; flex-wrap:wrap; align-items:end; margin-bottom:24px; padding:16px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); }
  .config-bar label { font-size:.75rem; color:var(--text2); display:flex; flex-direction:column; gap:4px; flex:1; min-width:160px; }
  .config-bar input { background:var(--bg); border:1px solid var(--border); color:var(--text); padding:6px 10px; border-radius:6px; font-size:.82rem; }
  .config-bar button { padding:6px 16px; background:var(--accent); color:#fff; border:none; border-radius:6px; cursor:pointer; font-size:.82rem; white-space:nowrap; }

  /* ── 标签页 ────────────────────────────── */
  .tabs { display:flex; gap:0; margin-bottom:20px; border-bottom:1px solid var(--border); }
  .tab { padding:10px 20px; cursor:pointer; color:var(--text2); font-size:.88rem; border-bottom:2px solid transparent; transition:.15s; }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); }
  .panel { display:none; }
  .panel.active { display:block; }

  /* ── 拖拽区 ─────────────────────────────── */
  .dropzone {
    border:2px dashed var(--border); border-radius:var(--radius); padding:40px 20px;
    text-align:center; cursor:pointer; transition:.2s; position:relative;
  }
  .dropzone:hover, .dropzone.dragover { border-color:var(--accent); background:rgba(88,166,255,.04); }
  .dropzone input[type=file] { position:absolute; inset:0; opacity:0; cursor:pointer; }
  .dropzone .icon { font-size:2rem; margin-bottom:8px; }
  .dropzone .hint { color:var(--text2); font-size:.82rem; }

  /* ── 图片预览 ───────────────────────────── */
  .previews { display:flex; flex-wrap:wrap; gap:10px; margin:16px 0; }
  .preview-item {
    position:relative; width:100px; height:100px; border-radius:8px; overflow:hidden;
    border:1px solid var(--border); background:var(--surface);
  }
  .preview-item img { width:100%; height:100%; object-fit:cover; }
  .preview-item .remove { position:absolute; top:2px; right:2px; width:20px; height:20px; border-radius:50%; background:var(--red); color:#fff; border:none; font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; opacity:0; transition:.15s; }
  .preview-item:hover .remove { opacity:1; }
  .preview-item .filename {
    position:absolute; bottom:0; left:0; right:0;
    background:rgba(0,0,0,.6); color:#fff; font-size:.65rem; padding:2px 4px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  /* ── Prompt 输入 ────────────────────────── */
  .prompt-row { display:flex; gap:8px; margin-bottom:16px; }
  .prompt-row input { flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:6px; font-size:.85rem; }

  /* ── 提交按钮 ───────────────────────────── */
  .submit-btn {
    padding:10px 28px; background:var(--accent); color:#fff; border:none;
    border-radius:6px; font-size:.9rem; cursor:pointer; transition:.15s;
  }
  .submit-btn:disabled { opacity:.5; cursor:not-allowed; }
  .submit-btn:hover:not(:disabled) { filter:brightness(1.1); }

  /* ── URL 输入行 ─────────────────────────── */
  .url-row { display:flex; gap:8px; margin-bottom:16px; }
  .url-row input { flex:1; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:8px 12px; border-radius:6px; font-size:.85rem; }

  /* ── 结果区 ─────────────────────────────── */
  .result-card {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
    padding:16px; margin-top:16px;
  }
  .result-card .label { color:var(--text2); font-size:.75rem; text-transform:uppercase; letter-spacing:.5px; margin-bottom:6px; }
  .result-card .value { font-size:1.05rem; font-weight:600; color:var(--green); }
  .result-card .error { color:var(--red); }

  .batch-results { margin-top:16px; }
  .batch-item { display:flex; align-items:center; gap:12px; padding:10px 14px; background:var(--surface); border:1px solid var(--border); border-radius:8px; margin-bottom:8px; }
  .batch-item img { width:48px; height:48px; object-fit:cover; border-radius:6px; }
  .batch-item .name { flex:0 0 auto; color:var(--text2); font-size:.8rem; max-width:200px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .batch-item .value { font-weight:600; color:var(--green); font-size:.9rem; }
  .batch-item .error { color:var(--red); font-size:.85rem; }
  .batch-item .spinner { width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .loading { text-align:center; padding:20px; color:var(--text2); }
  .loading::after { content:''; display:inline-block; width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-left:8px; }

  /* ── 并发数选择 ─────────────────────────── */
  .concurrency-row { display:flex; align-items:center; gap:8px; margin-bottom:16px; font-size:.82rem; color:var(--text2); }
  .concurrency-row input { width:60px; background:var(--bg); border:1px solid var(--border); color:var(--text); padding:4px 8px; border-radius:4px; text-align:center; }

  /* ── 统计信息 ───────────────────────────── */
  .stats { font-size:.8rem; color:var(--text2); margin:8px 0 16px; }
</style>
</head>
<body>
<div class="container">

  <h1>识图智能体</h1>
  <p class="subtitle">上传图片，返回 5-10 字的极简描述。支持任意 OpenAI 兼容的视觉模型。</p>

  <!-- 配置 -->
  <div class="config-bar">
    <label>API 地址 <input id="cfgBase" placeholder="http://localhost:11434/v1"></label>
    <label>API 密钥 <input id="cfgKey"  placeholder="ollama" type="password"></label>
    <label>模型名   <input id="cfgModel" placeholder="llava"></label>
    <button onclick="saveConfig()">保存</button>
  </div>

  <!-- 标签页 -->
  <div class="tabs">
    <div class="tab active" onclick="switchTab('single')">单图识别</div>
    <div class="tab" onclick="switchTab('batch')">文件夹批量</div>
  </div>

  <!-- 单图面板 -->
  <div id="panel-single" class="panel active">
    <div class="url-row">
      <input id="singleUrl" placeholder="或粘贴图片 URL ...">
    </div>
    <div class="dropzone" id="singleDrop">
      <input type="file" accept="image/*" id="singleFile" onchange="previewSingle()">
      <div class="icon">&#128247;</div>
      <div class="hint">点击或拖拽图片到这里</div>
    </div>
    <div id="singlePreview" class="previews"></div>
    <div class="prompt-row">
      <input id="singlePrompt" placeholder="补充提示词（留空则使用默认）">
    </div>
    <button class="submit-btn" id="singleBtn" onclick="recognizeSingle()" disabled>开始识别</button>
    <div id="singleResult"></div>
  </div>

  <!-- 批量面板 -->
  <div id="panel-batch" class="panel">
    <div class="dropzone" id="batchDrop">
      <!-- webkitdirectory 让用户选择整个文件夹 -->
      <input type="file" id="batchFiles" webkitdirectory directory multiple onchange="previewBatch()">
      <div class="icon">&#128193;</div>
      <div class="hint">点击选择一个文件夹（仅识别其中的图片文件）</div>
    </div>
    <div id="stats" class="stats"></div>
    <div id="batchPreviews" class="previews"></div>
    <div class="prompt-row">
      <input id="batchPrompt" placeholder="补充提示词（留空则使用默认）">
    </div>
    <div class="concurrency-row">
      并发数 <input id="batchConc" type="number" value="3" min="1" max="20">
    </div>
    <button class="submit-btn" id="batchBtn" onclick="recognizeBatch()" disabled>批量识别</button>
    <div id="batchResults" class="batch-results"></div>
  </div>

</div>

<script>
// ── 配置 ─────────────────────────────────────────────────────────────────
async function loadConfig() {
  try {
    const r = await fetch('/api/config');
    const c = await r.json();
    document.getElementById('cfgBase').value  = c.api_base || '';
    document.getElementById('cfgModel').value = c.model || '';
  } catch {}
}
async function saveConfig() {
  const body = new URLSearchParams();
  const b = document.getElementById('cfgBase').value;
  const k = document.getElementById('cfgKey').value;
  const m = document.getElementById('cfgModel').value;
  if (b) body.set('api_base', b);
  if (k) body.set('api_key', k);
  if (m) body.set('model', m);
  await fetch('/api/config', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body });
  loadConfig();
}
loadConfig();

// ── 标签切换 ──────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['single','batch'][i]===name));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
}

// ── 拖拽高亮 ──────────────────────────────────────────────────────────────
['singleDrop','batchDrop'].forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('dragover'); });
  el.addEventListener('dragleave', () => el.classList.remove('dragover'));
  el.addEventListener('drop', e => { e.preventDefault(); el.classList.remove('dragover'); const inp = el.querySelector('input'); inp.files = e.dataTransfer.files; inp.dispatchEvent(new Event('change')); });
});

// 判断是否为图片文件
function isImage(file) {
  return file.type.startsWith('image/') || /\.(jpg|jpeg|png|gif|bmp|webp|tiff?)$/i.test(file.name);
}

// ── 单图 ──────────────────────────────────────────────────────────────────
let singleFileObj = null;
function previewSingle() {
  const f = document.getElementById('singleFile').files[0];
  singleFileObj = f;
  const box = document.getElementById('singlePreview');
  box.innerHTML = '';
  if (f) {
    const url = URL.createObjectURL(f);
    box.innerHTML = `<div class="preview-item"><img src="${url}"></div>`;
    document.getElementById('singleBtn').disabled = false;
  }
}

async function recognizeSingle() {
  const btn = document.getElementById('singleBtn');
  const res = document.getElementById('singleResult');
  btn.disabled = true;
  res.innerHTML = '<div class="loading">识别中</div>';

  const fd = new FormData();
  if (singleFileObj) fd.append('file', singleFileObj);
  const url = document.getElementById('singleUrl').value.trim();
  if (url) fd.append('image_url', url);
  const prompt = document.getElementById('singlePrompt').value.trim();
  if (prompt) fd.append('prompt', prompt);

  try {
    const r = await fetch('/api/recognize', { method:'POST', body:fd });
    const data = await r.json();
    if (data.error) {
      res.innerHTML = `<div class="result-card"><div class="label">错误</div><div class="error">${data.error}</div></div>`;
    } else {
      res.innerHTML = `<div class="result-card"><div class="label">识别结果</div><div class="value">${data.result}</div></div>`;
    }
  } catch(e) {
    res.innerHTML = `<div class="result-card"><div class="label">错误</div><div class="error">${e.message}</div></div>`;
  }
  btn.disabled = false;
}

// ── 批量（文件夹）────────�───────────────────────────────────────────────
let batchFileList = [];
function previewBatch() {
  const all = document.getElementById('batchFiles').files;
  // 仅保留图片，过滤子文件夹里的非图片
  batchFileList = Array.from(all).filter(isImage);
  const box = document.getElementById('batchPreviews');
  box.innerHTML = '';
  document.getElementById('stats').innerText =
    `共 ${all.length} 个文件，其中 ${batchFileList.length} 张图片`;

  batchFileList.forEach((f, i) => {
    const url = URL.createObjectURL(f);
    const div = document.createElement('div');
    div.className = 'preview-item';
    div.innerHTML = `<img src="${url}"><button class="remove" onclick="removeBatch(${i})">&times;</button><div class="filename">${f.name}</div>`;
    box.appendChild(div);
  });
  document.getElementById('batchBtn').disabled = batchFileList.length === 0;
}

function removeBatch(idx) {
  batchFileList.splice(idx, 1);
  const box = document.getElementById('batchPreviews');
  box.innerHTML = '';
  document.getElementById('stats').innerText =
    `已选 ${batchFileList.length} 张图片`;
  batchFileList.forEach((f, i) => {
    const url = URL.createObjectURL(f);
    const div = document.createElement('div');
    div.className = 'preview-item';
    div.innerHTML = `<img src="${url}"><button class="remove" onclick="removeBatch(${i})">&times;</button><div class="filename">${f.name}</div>`;
    box.appendChild(div);
  });
  document.getElementById('batchBtn').disabled = batchFileList.length === 0;
}

async function recognizeBatch() {
  const btn = document.getElementById('batchBtn');
  const res = document.getElementById('batchResults');
  btn.disabled = true;

  // 占位 spinner
  res.innerHTML = batchFileList.map((f, i) => `
    <div class="batch-item" id="bitem-${i}">
      <div class="spinner"></div>
      <span class="name">${f.name}</span>
      <span class="value">—</span>
    </div>`).join('');

  const fd = new FormData();
  batchFileList.forEach(f => fd.append('files', f));
  const prompt = document.getElementById('batchPrompt').value.trim();
  if (prompt) fd.append('prompt', prompt);
  fd.append('concurrency', document.getElementById('batchConc').value || '3');

  try {
    const r = await fetch('/api/batch-recognize', { method:'POST', body:fd });
    const data = await r.json();
    data.forEach((item, i) => {
      const el = document.getElementById('bitem-'+i);
      if (!el) return;
      if (item.error) {
        el.innerHTML = `<span class="name">${item.name}</span><span class="error">${item.error}</span>`;
      } else {
        el.innerHTML = `<span class="name">${item.name}</span><span class="value">${item.result}</span>`;
      }
    });
  } catch(e) {
    res.innerHTML = `<div class="batch-item"><span class="error">${e.message}</span></div>`;
  }
  btn.disabled = false;
}
</script>
</body>
</html>
